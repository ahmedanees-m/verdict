# Pre-registered evaluation set for VERDICT.
#
# This file fixes the claims and their expected verdicts before the confound
# checks were wired to data, so the evaluation reads as a specification rather
# than a fit. Every value in a case is either from a named source or marked
# constructed for a structural test. No placeholder is filled with an invented
# number.
#
# Field schema per case: id, status (CONCRETE | CONSTRUCTED), claim, source,
# claim_type, parsed (the structured claim), expected_verdict, expected_firing_check,
# context_match_ok, power_ok, deleted_knowledge_ok, notes.

meta:
  project: VERDICT
  pre_registered: true
  date_committed: "2026-07-08"
  disease_scope: psoriasis
  atlas_conditions: [Rest, Stim8hr, Stim48hr]
  scope_caveat: >
    All verdicts are scoped to CD4+ T-cell functional genomics. A REFUTED or
    OVERCLAIMED verdict means "not supported given this data", never "the target
    is wrong". The primary confound catch is essentiality/pleiotropy; the
    direction check is secondary and is exercised here as a positive control.

acceptance_rules:
  - Every case declares an expected verdict and the check expected to fire.
  - No number reaches output without a receipt; missing data yields INSUFFICIENT.
  - The direction check fires only when the claim is context-matched (CD4+ T) and well-powered.
  - SUPPORTED verdicts are computed from receipted evidence, not retrieved.
  - No case uses DEXI/CLEC16A as a verdict target.
  - The confusion matrix over this set is reported in the submission.

cases:

  # ----- PRIMARY: a selective-regulator claim confounded by essentiality -----
  - id: med12_selectivity
    status: CONSTRUCTED
    claim: "MED12 is a selective regulator of the T-cell effector program in CD4+ T cells."
    source: "constructed archetype of a naive selectivity claim on core transcriptional machinery. MED12 is a subunit of the Mediator complex; its kinase module regulates T-cell effector differentiation (bioRxiv 2022.09.02.506235)."
    claim_type: selectivity
    parsed:
      gene: "MED12"
      disease: "psoriasis"
      program: "activation"
      direction: "regulates"
      scope: "selective"
      cell_type: "CD4+ T"
      condition: "Stim8hr"
    expected_verdict: OVERCLAIMED
    expected_firing_check: essentiality
    context_match_ok: true
    power_ok: true
    deleted_knowledge_ok: true
    notes: >
      The primary catch, chosen because MED12 is a subunit of the general Mediator
      transcriptional coactivator, where a selectivity claim is not credible. Fires
      because MED12 is broadly essential in DepMap (median Chronos -0.54) and its
      knockdown drives a genome-wide response in Zhu (99.9th-percentile breadth). The
      verdict is at the evidence level: a knockdown phenotype cannot establish
      selective regulation for a broadly essential, genome-wide factor, and it is a
      poor drug target. Never that MED12 fails to affect the program.

  # ----- SECONDARY: the same catch on a real publication -----
  - id: chd4_selectivity
    status: CONCRETE
    claim: "CHD4 is a selective regulator of the Th2 cytokine program in CD4+ T cells."
    source: "constructed as a naive selectivity reading of CHD4/NuRD's role in Th2 (characterized carefully in Hosokawa et al., PNAS 2013, 10.1073/pnas.1220865110)."
    claim_type: selectivity
    parsed:
      gene: "CHD4"
      disease: "psoriasis"
      program: "Th2"
      direction: "regulates"
      scope: "selective"
      cell_type: "CD4+ T"
      condition: "Stim8hr"
    expected_verdict: OVERCLAIMED
    expected_firing_check: essentiality
    context_match_ok: true
    power_ok: true
    deleted_knowledge_ok: true
    notes: >
      Real-publication counterpart. CHD4 is common-essential in DepMap (dependent in
      ~92% of cell lines) with top-percentile breadth in Zhu. Frame strictly at the
      evidence level: a knockdown-based specificity assertion is not supported given
      CHD4's genome-wide pleiotropy. This is not a refutation of the careful Hosokawa
      characterization; CHD4 does regulate Th2. The tested claim here is the naive
      selectivity reading, not that work.

  # ----- SUPPORTED: a genetically supported target, computed not retrieved -----
  - id: tyk2_psoriasis_genetics
    status: CONCRETE
    claim: "TYK2 is a genetically supported target for psoriasis."
    source: "Open Targets psoriasis genetic-association score 0.930; coding protective variant TYK2 P1104A (rs34536443, PMC10589750). Moonen 2026 provides candidate cis-regulatory links at the locus (Table S3)."
    claim_type: genetic_support
    parsed:
      gene: "TYK2"
      variant: "rs34536443"
      disease: "psoriasis"
      program: "IL-23/IL-17 axis"
      scope: "genetic_association"
      cell_type: "CD4+ T"
      cited_source: "Open Targets genetic association + coding variant"
    expected_verdict: SUPPORTED
    expected_firing_check: none
    context_match_ok: true
    power_ok: true
    deleted_knowledge_ok: true
    notes: >
      SUPPORTED is computed from the receipted robust legs: the Open Targets
      genetic-association score (0.930) and the coding protective variant P1104A
      (rs34536443). Keep the two variants distinct: rs34536443 is the coding variant
      behind the genetic support; rs144309607 is a noncoding variant whose Moonen CRE
      is prioritized to twelve genes at this locus (including ICAM1), so it does not
      resolve the target gene to TYK2 and is recorded only as candidate locus context.
      The available Moonen table is the prioritized candidate list, not the
      functionally significant CRE-gene subset.

  # ----- OVERCLAIMED: selectivity is not safety -----
  - id: tyk2_safety_scope
    status: CONCRETE
    claim: "TYK2 is a safe target because it acts only in activated T cells."
    source: "P1104A under M. tuberculosis negative selection (medRxiv 2022.01.26.22269888); TYK2 signals via IL-12/IL-23/type-I-IFN across cell types (PMC10589750)."
    claim_type: safety
    parsed:
      gene: "TYK2"
      disease: "psoriasis"
      program: "baseline immunity"
      scope: "organism_wide"
      cell_type: "CD4+ T"
    expected_verdict: OVERCLAIMED
    expected_firing_check: selectivity_safety
    context_match_ok: true
    power_ok: true
    deleted_knowledge_ok: true
    notes: >
      An organism-wide safety claim cannot be established from CD4+ T-cell data, and
      TYK2 is broadly expressed (Human Protein Atlas, detected in many tissues,
      breadth 0.75). The engine returns SCOPE_RESTRICTED and never asserts an
      organism-wide safe verdict.

  # ----- INSUFFICIENT: the tool refuses rather than guess -----
  - id: out_of_scope_safety
    status: CONSTRUCTED
    claim: "Knocking down this gene is safe across the whole immune system."
    source: constructed
    claim_type: safety
    parsed:
      gene: "any"
      program: "organism-wide baseline immunity"
      scope: "organism_wide"
      cell_type: "all immune cell types"
    expected_verdict: INSUFFICIENT
    expected_firing_check: range_scope
    context_match_ok: false
    power_ok: false
    deleted_knowledge_ok: true
    notes: >
      The refusal case. An organism-wide safety question over all immune cell types
      cannot be answered from CD4+ T-cell functional data, so the verdict is
      INSUFFICIENT rather than a fabricated answer.

  # ----- REFUTED: circular validation -----
  - id: circular_validation
    status: CONSTRUCTED
    claim: "This target is validated for its program by the same genome-scale CRISPRi screen used to validate it here."
    source: "constructed structural case; cited evidence shares provenance with the validating atlas."
    claim_type: composite
    parsed:
      gene: "any"
      disease: "psoriasis"
      cited_source: "Zhu2025"
    expected_verdict: REFUTED
    expected_firing_check: circularity
    context_match_ok: true
    power_ok: true
    deleted_knowledge_ok: true
    notes: >
      Fires because the claim's cited evidence and the validating atlas both derive
      from the Marson genome-scale CRISPRi screen (atlas_manifest.built_from). Circular
      support is not independent support.

  # ----- SUPPORTED: a clean regulator, direction consistent (positive control) -----
  - id: gata3_th2_regulator
    status: CONCRETE
    claim: "GATA3 promotes the Th2 program in CD4+ T cells."
    source: "GATA3 is the canonical master regulator of Th2 differentiation (standard immunology)."
    claim_type: directional
    parsed:
      gene: "GATA3"
      disease: "psoriasis"
      program: "Th2"
      direction: "promotes"
      scope: "cell_type_specific"
      cell_type: "CD4+ T"
      condition: "Stim8hr"
    expected_verdict: SUPPORTED
    expected_firing_check: none
    context_match_ok: true
    power_ok: true
    deleted_knowledge_ok: true
    notes: >
      True-negative control and the counterpart to the MED12 essentiality catch.
      GATA3 knockdown lowers the Th2 program (mean log2FC about -2.7, cross-guide r
      about 0.78) in Stim8hr, consistent with the claim, so the direction check does
      not fire and the verdict is SUPPORTED on receipted evidence. The discriminator
      against MED12 is essentiality, not breadth: GATA3 is non-essential in DepMap
      (median Chronos +0.09, dependent in under 5% of lines) though its knockdown is
      broad, so the essentiality check spares it, whereas MED12 is broadly essential
      and is flagged. A lineage-restricted, dispensable regulator versus a general,
      essential one.
